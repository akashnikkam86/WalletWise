<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>WalletWise - Edit Expense</title>
</head>
<body>
    <h1>Edit Expense</h1>

    <form method="post" th:action="@{/expenses/edit/{id}(id=${expense.id})}">
        <label>Title:</label><br>
        <input type="text" name="title" th:value="${expense.title}" required/><br><br>

        <label>Amount:</label><br>
        <input type="number" name="amount" step="0.01" th:value="${expense.amount}" required/><br><br>

        <label>Category:</label><br>
        <select name="category">
            <option value="Food" th:selected="${expense.category == 'Food'}">Food</option>
            <option value="Transport" th:selected="${expense.category == 'Transport'}">Transport</option>
            <option value="Shopping" th:selected="${expense.category == 'Shopping'}">Shopping</option>
            <option value="Bills" th:selected="${expense.category == 'Bills'}">Bills</option>
            <option value="Health" th:selected="${expense.category == 'Health'}">Health</option>
            <option value="Other" th:selected="${expense.category == 'Other'}">Other</option>
        </select><br><br>

        <label>Date:</label><br>
        <input type="date" name="expenseDate" th:value="${expense.expenseDate}" required/><br><br>

        <label>Note:</label><br>
        <input type="text" name="note" th:value="${expense.note}"/><br><br>

        <button type="submit">Update Expense</button>
    </form>

    <br>
    <a href="/dashboard">Cancel</a>
</body>
</html>
