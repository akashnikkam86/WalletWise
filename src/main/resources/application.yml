spring:
  application:
    name: walletwise
  datasource:
    url: jdbc:postgresql://localhost:5432/walletwise
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_batch_fetch_size: 20
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
app:
  jwt:
    secret: ${JWT_SECRET:walletwise-dev-secret-key-must-be-at-least-256-bits-long!!}
    expiration-ms: 86400000
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operations-sorter: method
    tags-sorter: alpha
logging:
  level:
    com.walletwise: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO
