<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WalletWise - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand">💰 WalletWise</span>
            <div>
                <a href="/expenses/add" class="btn btn-light btn-sm me-2">+ Add Expense</a>
                <a href="/budget" class="btn btn-outline-light btn-sm me-2">Set Budget</a>
                <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h4>Welcome, <span th:text="${username}" class="text-primary"></span>!</h4>

        <div th:if="${budgetExceeded}" class="alert alert-danger mt-3">
            ⚠️ You have exceeded your monthly budget of ₹<span th:text="${budgetLimit}"></span>!
        </div>
        <div th:if="${budgetLimit != null and !budgetExceeded}" class="alert alert-success mt-3">
            ✅ Monthly budget: ₹<span th:text="${budgetLimit}"></span>
        </div>

        <div class="row mt-3">
            <div class="col-md-4">
                <div class="card text-white bg-primary shadow">
                    <div class="card-body">
                        <h6 class="card-title">Total Spent</h6>
                        <h3>₹<span th:text="${total}"></span></h3>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-header bg-secondary text-white">
                        Spending by Category
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-sm mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Category</th>
                                    <th>Amount</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="entry : ${categoryMap}">
                                    <td th:text="${entry.key}"></td>
                                    <td>₹<span th:text="${entry.value}"></span></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        All Expenses
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Date</th>
                                    <th>Title</th>
                                    <th>Category</th>
                                    <th>Amount</th>
                                    <th>Note</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="expense : ${expenses}">
                                    <td th:text="${expense.expenseDate}"></td>
                                    <td th:text="${expense.title}"></td>
                                    <td>
                                        <span class="badge bg-secondary" th:text="${expense.category}"></span>
                                    </td>
                                    <td>₹<span th:text="${expense.amount}"></span></td>
                                    <td th:text="${expense.note}"></td>
                                    <td>
                                        <a th:href="@{/expenses/edit/{id}(id=${expense.id})}"
                                           class="btn btn-sm btn-warning me-1">Edit</a>
                                        <form th:action="@{/expenses/delete/{id}(id=${expense.id})}"
                                              method="post" style="display:inline;">
                                            <button type="submit"
                                                    class="btn btn-sm btn-danger">Delete</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
