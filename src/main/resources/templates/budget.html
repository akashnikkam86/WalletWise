<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>WalletWise - Set Budget</title>
</head>
<body>
    <h1>Set Monthly Budget</h1>

    <div th:if="${currentBudget}">
        <p>Current budget for this month: 
            <strong>&#8377;<span th:text="${currentBudget}"></span></strong>
        </p>
    </div>

    <form method="post" th:action="@{/budget}">
        <label>Monthly Limit (&#8377;):</label><br>
        <input type="number" name="monthlyLimit" step="0.01" 
               min="1" required/><br><br>
        <button type="submit">Set Budget</button>
    </form>

    <br>
    <a href="/dashboard">Back to Dashboard</a>
</body>
</html>
