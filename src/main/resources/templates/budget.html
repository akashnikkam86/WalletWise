<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>WalletWise - Set Budget</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
        <div class="container">
            <span class="navbar-brand">💰 WalletWise</span>
            <a href="/dashboard" class="btn btn-outline-light btn-sm">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">Set Monthly Budget</h5>
                    </div>
                    <div class="card-body p-4">

                        <div th:if="${currentBudget}" class="alert alert-info">
                            Current budget for this month:
                            <strong>₹<span th:text="${currentBudget}"></span></strong>
                        </div>

                        <form method="post" th:action="@{/budget}">
                            <div class="mb-3">
                                <label class="form-label">Monthly Limit (₹)</label>
                                <input type="number" name="monthlyLimit" step="0.01"
                                       min="1" class="form-control" required/>
                            </div>
                            <button type="submit" class="btn btn-success w-100">Set Budget</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
